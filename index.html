<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>強震動 室内シミュレーター</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<style>
:root{
  --bg:#0e1116; --panel:#161c25; --panel2:#1d2530; --line:#2a3442;
  --tx:#d7dee8; --dim:#8593a5;
  --acc:#ff5c49; --vel:#2dd4bf; --dsp:#f5b942;
  --ns:#5aa2ff; --ew:#3ddc97; --ud:#aab4c4;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;font-size:13px}
#view{position:absolute;inset:0}
canvas{display:block}
.mono{font-family:ui-monospace,"SF Mono",Consolas,monospace}

/* ---- left control panel ---- */
#panel{position:absolute;left:0;top:0;bottom:0;width:252px;background:var(--panel);
  border-right:1px solid var(--line);padding:12px;overflow-y:auto;z-index:10;
  transition:transform .25s ease}
#panel.hidden{transform:translateX(-100%)}
#panelToggle{position:absolute;top:10px;left:262px;z-index:12;transition:left .25s ease}
body.panel-hidden #panelToggle{left:10px}
#panel h1{font-size:14px;letter-spacing:.08em;margin-bottom:2px}
#panel .sub{color:var(--dim);font-size:10px;margin-bottom:10px}
.sec{border-top:1px solid var(--line);padding:10px 0}
.sec h2{font-size:11px;color:var(--dim);letter-spacing:.12em;margin-bottom:8px}
button{background:var(--panel2);color:var(--tx);border:1px solid var(--line);
  border-radius:4px;padding:6px 10px;cursor:pointer;font-size:12px}
button:hover:not(:disabled){border-color:#4a5a70}
button:disabled{opacity:.35;cursor:default}
button.primary{background:#2b4a6f;border-color:#3d6491}
button.primary:hover:not(:disabled){background:#33587f}
.row{display:flex;gap:6px;align-items:center;margin:6px 0;flex-wrap:wrap}
.grow{flex:1}
label.chk{display:flex;align-items:center;gap:7px;padding:4px 2px;cursor:pointer}
label.chk input{accent-color:#5aa2ff}
label.chk .spec{margin-left:auto;color:var(--dim);font-size:10px}
.cfg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim);
  padding:0 2px 6px 26px}
.cfg input{width:3.6em;padding:2px 4px;font-size:11px}
input[type=range]{width:100%}
select,input[type=number]{background:var(--panel2);color:var(--tx);border:1px solid var(--line);
  border-radius:4px;padding:4px 6px;font-size:12px}
#fileName{font-size:10px;color:var(--dim);word-break:break-all;margin-top:4px}
#recInfo{font-size:11px;line-height:1.7;color:var(--tx)}
#recInfo b{color:var(--dim);font-weight:normal;display:inline-block;width:5.5em}
.peak{display:flex;justify-content:space-between;font-size:12px;margin:2px 0}
.peak .v{font-family:ui-monospace,Consolas,monospace}
.peak.pa .v{color:var(--acc)} .peak.pv .v{color:var(--vel)} .peak.pd .v{color:var(--dsp)}
#status{font-size:11px;line-height:1.8}
#status .item{display:flex;justify-content:space-between}
#status .fall{color:var(--acc)} #status .slide{color:var(--dsp)} #status .ok{color:var(--dim)}
#timeRead{font-size:18px;text-align:center;margin:4px 0;letter-spacing:.05em}

/* ---- waveform drawer (right edge) ---- */
#waveDrawer{position:absolute;right:0;top:0;bottom:0;width:340px;background:rgba(14,17,22,.92);
  border-left:1px solid var(--line);z-index:10;display:flex;flex-direction:column;
  transition:transform .25s ease;padding:10px}
#waveDrawer.hidden{transform:translateX(100%)}
#waveDrawer h2{font-size:11px;color:var(--dim);letter-spacing:.12em;margin-bottom:6px}
.chart{flex:1;display:flex;flex-direction:column;min-height:0;margin-bottom:8px}
.chart .hd{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.chart canvas{flex:1;width:100%;background:#10151c;border:1px solid var(--line);border-radius:3px}
#legend{display:flex;gap:12px;font-size:10px;color:var(--dim);margin-bottom:6px}
#legend i{display:inline-block;width:10px;height:2px;vertical-align:middle;margin-right:4px}
#waveToggle{position:absolute;top:10px;right:10px;z-index:11}
#waveToggle.shift{right:350px}
#orbitToggle{position:absolute;top:44px;right:10px;z-index:11}
#orbitToggle.shift{right:350px}
#orbitPanel{position:absolute;left:262px;bottom:16px;z-index:11;display:none;
  background:rgba(14,17,22,.92);border:1px solid var(--line);border-radius:4px;
  padding:8px;transition:left .25s ease}
#orbitPanel.show{display:block}
body.panel-hidden #orbitPanel{left:12px}
#orbitPanel h2{font-size:10px;color:var(--dim);letter-spacing:.1em;margin-bottom:4px}
#orbitCanvas{width:230px;height:230px;background:#10151c;border:1px solid var(--line);border-radius:3px}
#accHud{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:9;
  background:rgba(14,17,22,.78);border:1px solid var(--line);border-radius:4px;
  padding:3px 16px;text-align:center;pointer-events:none}
#accHud .lb{font-size:10px;color:var(--dim);letter-spacing:.08em}
#accHud .v{font-size:22px;color:var(--acc);font-family:ui-monospace,Consolas,monospace}
#accHud .u{font-size:11px;color:var(--dim)}
#msg{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:12;
  background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:6px 14px;
  font-size:12px;display:none}
</style>
</head>
<body>
<div id="view"></div>

<div id="panel">
  <h1>強震動 家具挙動シミュレーター</h1>
  <div class="sub">K-NET / KiK-net CSV → 変位波形 → 振動台加振</div>

  <div class="sec">
    <h2>室内空間</h2>
    <select id="sceneSel" style="width:100%">
      <option value="home" selected>一般家庭（和室）</option>
      <option value="office">オフィス</option>
    </select>
  </div>

  <div class="sec">
    <h2>波形ファイル</h2>
    <div class="row">
      <button class="primary grow" id="btnFile">CSVを読み込む</button>
      <input type="file" id="fileInput" accept=".csv,text/csv" style="display:none">
    </div>
    <div id="fileName">未読込</div>
    <div id="recInfo"></div>
    <div id="peaks" style="margin-top:6px"></div>
  </div>

  <div class="sec">
    <h2>家具の選択（複数可）</h2>
    <div id="furnList"></div>
    <div class="row"><button class="grow" id="btnPlace">室内に配置（リセット）</button></div>
  </div>

  <div class="sec">
    <h2>建物応答（多質点せん断モデル）</h2>
    <label class="chk"><input type="checkbox" id="bldOn">
      <span>建物内の階で加振</span></label>
    <div class="row"><span style="width:5em">構造種別</span>
      <select id="bldType" class="grow">
        <option value="S" selected>S造（T₁=0.03H, h=2%）</option>
        <option value="RC">RC造（T₁=0.02H, h=3%）</option>
      </select></div>
    <div class="row"><span style="width:5em">階数</span>
      <input type="number" id="bldN" class="grow" value="20" min="3" max="50" step="1"></div>
    <div class="row"><span style="width:5em">対象階</span>
      <input type="number" id="bldFloor" class="grow" value="20" min="1" max="50" step="1"></div>
    <div id="bldInfo" style="font-size:10px;color:var(--dim);line-height:1.7"></div>
  </div>

  <div class="sec">
    <h2>加振</h2>
    <div id="timeRead" class="mono">0.0 s</div>
    <div class="row">
      <button class="primary grow" id="btnRun" disabled>加振開始</button>
      <button id="btnStop" disabled>停止</button>
    </div>
    <div class="row">
      <span style="width:5em">再生速度</span>
      <select id="speed" class="grow">
        <option value="0.25">0.25×</option><option value="0.5">0.5×</option>
        <option value="1" selected>1.0×</option><option value="2">2.0×</option>
      </select>
    </div>
    <div class="row">
      <span style="width:5em">開始時刻</span>
      <input type="number" id="startSkip" class="grow" value="10" min="0" step="1"> <span>s</span>
    </div>
    <div class="row">
      <span style="width:5em">振幅倍率</span>
      <input type="number" id="ampScale" class="grow" value="1.0" min="0.1" max="3" step="0.1">
    </div>
    <label class="chk"><input type="checkbox" id="swapNSEW">
      <span>NS↔EW 入替（NS記録→EW加振）</span></label>
  </div>

  <div class="sec">
    <h2>家具の状態</h2>
    <div id="status"><span class="ok">— 未配置 —</span></div>
  </div>
</div>

<button id="panelToggle">≪ パネル</button>
<button id="waveToggle" class="shift">波形 表示/非表示</button>
<button id="orbitToggle" class="shift">軌跡 NS-EW</button>

<div id="accHud">
  <div class="lb">直近1秒 最大加速度（合成）</div>
  <span class="v" id="accRead">—</span> <span class="u">gal</span>
</div>

<div id="orbitPanel">
  <h2>変位軌跡（水平面 NS-EW）</h2>
  <canvas id="orbitCanvas"></canvas>
</div>

<div id="waveDrawer">
  <div id="legend">
    <span><i style="background:var(--ns)"></i>NS</span>
    <span><i style="background:var(--ew)"></i>EW</span>
    <span><i style="background:var(--ud)"></i>UD</span>
  </div>
  <div class="chart"><div class="hd"><span style="color:var(--acc)">加速度 (gal)</span><span class="mono" id="pkA"></span></div><canvas id="cA"></canvas></div>
  <div class="chart"><div class="hd"><span style="color:var(--vel)">速度 (cm/s)</span><span class="mono" id="pkV"></span></div><canvas id="cV"></canvas></div>
  <div class="chart"><div class="hd"><span style="color:var(--dsp)">変位 (cm)</span><span class="mono" id="pkD"></span></div><canvas id="cD"></canvas></div>
</div>

<div id="msg"></div>

<script>
"use strict";
/* =====================================================================
 * 1. K-NET / KiK-net CSV parser
 * ===================================================================== */
function parseKnetCsv(text){
  const lines = text.split(/\r?\n/);
  const rec = {header:{}, nch:0, dt:0.01, acc:null, n:0, kik:false};
  const data = [];
  let originLine=null, stationLine=null, freqNext=false, durNext=false;
  for(let i=0;i<lines.length;i++){
    const L=lines[i];
    if(!L) continue;
    if(L[0]==='#'){
      const body=L.slice(1).trim();
      if(freqNext){ rec.header.fs=parseFloat(body); rec.dt=1/rec.header.fs; freqNext=false; continue; }
      if(durNext){ rec.header.dur=parseFloat(body); durNext=false; continue; }
      if(/^SamplingFrequency/i.test(body)){ freqNext=true; continue; }
      if(/^DurationTime/i.test(body)){ durNext=true; continue; }
      if(/^\d{4}\//.test(body)){ // origin time line
        const p=body.split(',');
        if(p.length>=5 && !originLine){ originLine=p;
          rec.header.origin=p[0]; rec.header.mag=p[4]; rec.header.depth=p[3];
        }
        continue;
      }
      if(/^[A-Z]{3}[A-Z0-9]+,/.test(body) && !stationLine){
        const p=body.split(',');
        stationLine=p; rec.header.code=p[0];
        rec.kik = p.length>=5; // Height1,Height2
        continue;
      }
      continue;
    }
    // data line: Time,Rel,ch...
    const p=L.split(',');
    if(p.length<5) continue;
    const vals=new Array(p.length-2);
    for(let k=2;k<p.length;k++) vals[k-2]=parseFloat(p[k]);
    data.push(vals);
  }
  if(data.length<10) throw new Error("波形データ行が見つかりません");
  const nchRaw=data[0].length;
  rec.kik = rec.kik || nchRaw===6;
  // K-NET: 3ch (NS,EW,UD surface). KiK-net: 6ch → surface = ch4-6
  const off = (nchRaw===6)?3:0;
  rec.nch=3; rec.n=data.length;
  const ns=new Float64Array(rec.n), ew=new Float64Array(rec.n), ud=new Float64Array(rec.n);
  for(let i=0;i<rec.n;i++){ ns[i]=data[i][off]; ew[i]=data[i][off+1]; ud[i]=data[i][off+2]; }
  rec.acc=[ns,ew,ud];
  rec.header.type = (nchRaw===6)?"KiK-net（地表成分 ch4-6 使用）":"K-NET（地表3成分）";
  rec.fmt="knet";
  return rec;
}

/* 気象庁強震観測フォーマット（Shift-JIS, NS/EW/UD, 北・東・上が正） */
function parseJmaCsv(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
  const rec={header:{},dt:0.01,acc:null,n:0};
  let di=-1;
  for(let i=0;i<Math.min(lines.length,12);i++){
    const L=lines[i];
    if(i===0)rec.header.code=(L.split(',')[0]||'').replace(/SITE\s*CODE\s*=?/i,'').trim();
    let m=L.match(/SAMPLING\s*RATE\s*=?\s*([\d.]+)/i);
    if(m)rec.header.fs=parseFloat(m[1]);
    m=L.match(/INITIAL\s*TIME\s*=?\s*([\d][\d ]+)/i);
    if(m)rec.header.origin=m[1].trim();
    const cells=L.split(',').map(s=>s.trim()).filter(s=>s.length);
    if(cells.length>=3&&cells.every(c=>/^(NS|EW|UD|N-S|E-W|U-D)$/i.test(c))){di=i+1;break;}
  }
  if(di<0){ // 仕様通りの並び: 1:コード 2:緯度 3:経度 4:fs 5:単位 6:開始時刻 7:成分名
    rec.header.code=lines[0].split(',')[0].trim();
    const v=parseFloat(lines[3]); if(v>0)rec.header.fs=v;
    rec.header.origin=(lines[5]||'').trim();
    di=7;
  }
  if(!rec.header.fs)rec.header.fs=100;
  rec.dt=1/rec.header.fs;
  const ns=[],ew=[],ud=[];
  for(let i=di;i<lines.length;i++){
    const p=lines[i].split(',');
    const a=parseFloat(p[0]),b=parseFloat(p[1]),c=parseFloat(p[2]);
    if(isNaN(a)||isNaN(b)||isNaN(c))continue;
    ns.push(a);ew.push(b);ud.push(c);
  }
  rec.n=ns.length;
  if(rec.n<10)throw new Error("波形データ行が見つかりません");
  rec.acc=[Float64Array.from(ns),Float64Array.from(ew),Float64Array.from(ud)];
  rec.header.type="気象庁強震観測（NS,EW,UD）";
  rec.fmt="jma";
  return rec;
}
function parseAnyCsv(text){
  const t=text.replace(/^\uFEFF/,'');
  return /^#K-NET/m.test(t.slice(0,300))?parseKnetCsv(t):parseJmaCsv(t);
}

/* =====================================================================
 * 2. DSP — Butterworth HPF (斎藤1978 漸化式フィルタ設計準拠) + 台形積分
 *    fp=0.1Hz, fs=0.05Hz, Ap=0.1dB, As=10dB
 * ===================================================================== */
function designHpf(fsamp){
  const Ap=0.1, As=10.0, fp=0.1, fstop=0.05;
  const wp=Math.tan(Math.PI*fp/fsamp), ws=Math.tan(Math.PI*fstop/fsamp);
  const n=Math.ceil(Math.log10((Math.pow(10,As/10)-1)/(Math.pow(10,Ap/10)-1)) /
                    (2*Math.log10(wp/ws)));
  const eps=Math.sqrt(Math.pow(10,Ap/10)-1);
  const wc=wp*Math.pow(eps,1/n); // prewarped analog cutoff (HPF)
  const secs=[];
  for(let k=0;k<Math.floor(n/2);k++){
    const a1=2*Math.sin((2*k+1)*Math.PI/(2*n));
    const A=1+a1*wc+wc*wc, B=2*(wc*wc-1), C=1-a1*wc+wc*wc;
    secs.push({b:[1/A,-2/A,1/A], a:[B/A,C/A]});
  }
  if(n%2){
    const A=1+wc;
    secs.push({b:[1/A,-1/A,0], a:[(wc-1)/A,0]});
  }
  return secs;
}
function applyFilter(x,secs){
  let y=Float64Array.from(x);
  for(const s of secs){
    const out=new Float64Array(y.length);
    let x1=0,x2=0,y1=0,y2=0;
    const b0=s.b[0],b1=s.b[1],b2=s.b[2],a1=s.a[0],a2=s.a[1];
    for(let i=0;i<y.length;i++){
      const xi=y[i];
      const yi=b0*xi+b1*x1+b2*x2-a1*y1-a2*y2;
      x2=x1;x1=xi;y2=y1;y1=yi;out[i]=yi;
    }
    y=out;
  }
  return y;
}
function cumTrapz(x,dt){
  const y=new Float64Array(x.length);
  for(let i=1;i<x.length;i++) y[i]=y[i-1]+(x[i]+x[i-1])*0.5*dt;
  return y;
}
/* 気象庁 積分漸化式（斉藤1978による係数設計）
   速度: カットオフ5秒 3次Butterworth積分 / 変位: 1倍強震計(T0=6s,h=0.55)特性再現 */
function jmaVel(a){
  const G=0.004937561699,
        A1=-2.974867761716, A2=2.950050339269, A3=-0.975180618018;
  const v=new Float64Array(a.length);
  for(let t=0;t<a.length;t++){
    const a1=t>0?a[t-1]:0, a2=t>1?a[t-2]:0, a3=t>2?a[t-3]:0;
    const v1=t>0?v[t-1]:0, v2=t>1?v[t-2]:0, v3=t>2?v[t-3]:0;
    v[t]=G*(a[t]-a1-a2+a3)-(A1*v1+A2*v2+A3*v3);
  }
  return v;
}
function jmaDisp(a){
  const H=1.0,
        C1=-1.988438073558305, C2=0.9885471048650272,
        D0=0.00002485615736514583, D1=0.00004971231473029166, D2=0.00002485615736514583;
  const d=new Float64Array(a.length);
  for(let t=0;t<a.length;t++){
    const a1=t>0?a[t-1]:0, a2=t>1?a[t-2]:0;
    const d1=t>0?d[t-1]:0, d2=t>1?d[t-2]:0;
    d[t]=H*(D0*a[t]+D1*a1+D2*a2)-(C1*d1+C2*d2);
  }
  return d;
}
function resampleLinear(x,dtIn,dtOut){
  const n=Math.floor((x.length-1)*dtIn/dtOut)+1;
  const y=new Float64Array(n);
  for(let i=0;i<n;i++){
    const t=i*dtOut/dtIn, i0=Math.min(Math.floor(t),x.length-2), f=t-i0;
    y[i]=x[i0]*(1-f)+x[i0+1]*f;
  }
  return y;
}
function processRecord(rec){
  const fs=rec.header.fs||100;
  let dt=rec.dt;
  const acc=[],vel=[],dsp=[];
  const secs=rec.fmt==="jma"?null:designHpf(fs);
  if(rec.fmt==="jma"&&Math.abs(fs-100)>1e-6){ // 漸化式係数は100Hz設計 → 100Hzへ再標本化
    rec.acc=rec.acc.map(a=>resampleLinear(a,dt,0.01));
    dt=0.01;
  }
  for(let c=0;c<3;c++){
    const raw=rec.acc[c];
    let m=0; for(let i=0;i<raw.length;i++)m+=raw[i]; m/=raw.length;
    const a0=new Float64Array(raw.length);
    for(let i=0;i<raw.length;i++)a0[i]=raw[i]-m;      // オフセット(平均)除去
    if(rec.fmt==="jma"){
      acc.push(a0);
      vel.push(jmaVel(a0));                            // 積分漸化式 (cm/s)
      dsp.push(jmaDisp(a0));                           // 積分漸化式 (cm)
    }else{
      const a=applyFilter(a0,secs);                    // HPF
      const v=applyFilter(cumTrapz(a,dt),secs);        // 積分→HPF (cm/s)
      const d=applyFilter(cumTrapz(v,dt),secs);        // 積分→HPF (cm)
      acc.push(a);vel.push(v);dsp.push(d);
    }
  }
  const n=acc[0].length;
  let pga=0,pgv=0,pgd=0;
  for(let i=0;i<n;i++){
    const A=Math.hypot(acc[0][i],acc[1][i],acc[2][i]);
    const V=Math.hypot(vel[0][i],vel[1][i],vel[2][i]);
    const D=Math.hypot(dsp[0][i],dsp[1][i],dsp[2][i]);
    if(A>pga)pga=A; if(V>pgv)pgv=V; if(D>pgd)pgd=D;
  }
  return {acc,vel,dsp,n,dt,pga,pgv,pgd,dur:(n-1)*dt};
}

/* =====================================================================
 * 2b. 建物応答 — 多質点せん断モデルの時刻歴応答解析
 *     等質量・等剛性のせん断型建物。ω_j = 2√(k/m)·sin((2j−1)π/(2(2N+1)))
 *     T₁を構造種別の略算式（S造0.03H, RC造0.02H, 階高4m）に合わせてkを決定。
 *     減衰はRayleigh型（1次・2次モードで h を指定）。
 *     Newmark-β法（平均加速度 β=1/4, γ=1/2）。K̂は三重対角 → Thomas法で毎ステップO(N)。
 *     水平2成分（NS,EW）を解析、UDは地表波をそのまま使用。
 * ===================================================================== */
function buildingResponse(pg,cfg){
  const N=cfg.N|0, fl=Math.min(Math.max(cfg.floor|0,1),N);
  const hgt=4.0, H=hgt*N;
  const T1=(cfg.type==="RC"?0.02:0.03)*H;
  const h =(cfg.type==="RC"?0.03:0.02);
  const m=1.0e6;                                   // 1000 t/階
  const w1=2*Math.PI/T1;
  const k=m*Math.pow(w1/(2*Math.sin(Math.PI/(2*(2*N+1)))),2);
  const w2=Math.sqrt(k/m)*2*Math.sin(3*Math.PI/(2*(2*N+1)));
  const a0=2*h*w1*w2/(w1+w2), a1=2*h/(w1+w2);      // C = a0·M + a1·K
  const dt=pg.dt, n=pg.n;
  const dK=new Float64Array(N);
  for(let i=0;i<N;i++)dK[i]=(i<N-1?2*k:k);
  const oK=-k;
  const b=0.25,g=0.5;
  const c0=1/(b*dt*dt), c1=g/(b*dt), c2=1/(b*dt), c3=1/(2*b)-1, c4=g/b-1, c5=dt*(g/(2*b)-1);
  // K̂ = (1+c1·a1)K + (c1·a0+c0)m·I  （三重対角のまま）
  const fK=1+c1*a1, fM=(c1*a0+c0)*m, oH=fK*oK;
  const dd=new Float64Array(N), cp=new Float64Array(N);
  dd[0]=fK*dK[0]+fM; cp[0]=oH/dd[0];
  for(let i=1;i<N;i++){dd[i]=fK*dK[i]+fM-oH*cp[i-1]; cp[i]=oH/dd[i];}
  function solve(r,out){
    out[0]=r[0]/dd[0];
    for(let i=1;i<N;i++)out[i]=(r[i]-oH*out[i-1])/dd[i];
    for(let i=N-2;i>=0;i--)out[i]-=cp[i]*out[i+1];
  }
  function mulK(x,y){
    for(let i=0;i<N;i++){
      let s=dK[i]*x[i];
      if(i>0)s+=oK*x[i-1];
      if(i<N-1)s+=oK*x[i+1];
      y[i]=s;
    }
  }
  const acc=[],vel=[],dsp=[];
  for(let comp=0;comp<2;comp++){                   // NS, EW
    const agArr=pg.acc[comp];
    const u=new Float64Array(N),v=new Float64Array(N),a=new Float64Array(N);
    const P=new Float64Array(N),tmp=new Float64Array(N),Kt=new Float64Array(N),un=new Float64Array(N);
    const ag0=agArr[0]*0.01;                       // gal→m/s²
    for(let i=0;i<N;i++)a[i]=-ag0;                 // 初期: M a = −M·1·ag
    const outA=new Float64Array(n),outV=new Float64Array(n),outD=new Float64Array(n);
    outA[0]=(a[fl-1]+ag0)*100; outV[0]=pg.vel[comp][0]; outD[0]=pg.dsp[comp][0];
    for(let t=1;t<n;t++){
      const ag=agArr[t]*0.01;
      for(let i=0;i<N;i++)tmp[i]=c1*u[i]+c4*v[i]+c5*a[i];
      mulK(tmp,Kt);
      for(let i=0;i<N;i++)
        P[i]=-m*ag + m*(c0*u[i]+c2*v[i]+c3*a[i]) + a0*m*tmp[i] + a1*Kt[i];
      solve(P,un);
      for(let i=0;i<N;i++){
        const an=c0*(un[i]-u[i])-c2*v[i]-c3*a[i];
        v[i]=v[i]+dt*((1-g)*a[i]+g*an);
        u[i]=un[i]; a[i]=an;
      }
      outA[t]=(a[fl-1]+ag)*100;                    // 絶対加速度 gal
      outV[t]=pg.vel[comp][t]+v[fl-1]*100;         // 絶対速度 cm/s
      outD[t]=pg.dsp[comp][t]+u[fl-1]*100;         // 絶対変位 cm
    }
    acc.push(outA);vel.push(outV);dsp.push(outD);
  }
  acc.push(Float64Array.from(pg.acc[2]));          // UDは地表波
  vel.push(Float64Array.from(pg.vel[2]));
  dsp.push(Float64Array.from(pg.dsp[2]));
  let pga=0,pgv=0,pgd=0;
  for(let i=0;i<n;i++){
    const A=Math.hypot(acc[0][i],acc[1][i],acc[2][i]);
    const V=Math.hypot(vel[0][i],vel[1][i],vel[2][i]);
    const D=Math.hypot(dsp[0][i],dsp[1][i],dsp[2][i]);
    if(A>pga)pga=A; if(V>pgv)pgv=V; if(D>pgd)pgd=D;
  }
  return {acc,vel,dsp,n,dt,pga,pgv,pgd,dur:pg.dur,
          bld:{N,floor:fl,T1,h,type:cfg.type}};
}

/* simple orbit control */
let camTheta=0.8, camPhi=1.15, camDist=8.2, camTarget=new THREE.Vector3(0,1.0,0);
function updateCam(){
  camera.position.set(
    camTarget.x+camDist*Math.sin(camPhi)*Math.cos(camTheta),
    camTarget.y+camDist*Math.cos(camPhi),
    camTarget.z+camDist*Math.sin(camPhi)*Math.sin(camTheta));
  camera.lookAt(camTarget);
}
function initOrbit(){
  const el=renderer.domElement; let drag=false,px=0,py=0;
  el.addEventListener("pointerdown",e=>{drag=true;px=e.clientX;py=e.clientY;});
  addEventListener("pointerup",()=>drag=false);
  addEventListener("pointermove",e=>{
    if(!drag)return;
    camTheta+=(e.clientX-px)*0.006; camPhi-=(e.clientY-py)*0.006;
    camPhi=Math.max(0.15,Math.min(1.55,camPhi));
    px=e.clientX;py=e.clientY; updateCam();
  });
  el.addEventListener("wheel",e=>{
    camDist=Math.max(3,Math.min(20,camDist+e.deltaY*0.005)); updateCam();
  },{passive:true});
  updateCam();
}

function initPhysics(){
  world=new CANNON.World();
  world.gravity.set(0,-9.81,0);
  world.broadphase=new CANNON.SAPBroadphase(world);
  world.solver.iterations=40;
  world.defaultContactMaterial.contactEquationStiffness=1e8;
  world.defaultContactMaterial.contactEquationRelaxation=3;
  world.defaultContactMaterial.frictionEquationStiffness=1e8;
  buildRoom();
}

const floorMat=new CANNON.Material("floor");
function buildRoom(){
  const sc=SCENES[SCENE];
  ROOM_W=sc.W; ROOM_D=sc.D; ROOM_H=sc.H;
  if(roomBody){world.remove(roomBody);roomBody=null;}
  if(roomGroup){scene.remove(roomGroup);roomGroup=null;}
  // kinematic body: floor slab + 4 walls（部屋全体が振動台として一体で動く）
  roomBody=new CANNON.Body({mass:0,type:CANNON.Body.KINEMATIC,material:floorMat});
  roomBody.addShape(new CANNON.Box(new CANNON.Vec3(ROOM_W/2,0.175,ROOM_D/2)),
                    new CANNON.Vec3(0,-0.175,0));
  const wh=ROOM_H/2;
  roomBody.addShape(new CANNON.Box(new CANNON.Vec3(ROOM_W/2,wh,WALL_T/2)),
                    new CANNON.Vec3(0,wh,-ROOM_D/2-WALL_T/2));
  roomBody.addShape(new CANNON.Box(new CANNON.Vec3(ROOM_W/2,wh,WALL_T/2)),
                    new CANNON.Vec3(0,wh, ROOM_D/2+WALL_T/2));
  roomBody.addShape(new CANNON.Box(new CANNON.Vec3(WALL_T/2,wh,ROOM_D/2)),
                    new CANNON.Vec3(-ROOM_W/2-WALL_T/2,wh,0));
  roomBody.addShape(new CANNON.Box(new CANNON.Vec3(WALL_T/2,wh,ROOM_D/2)),
                    new CANNON.Vec3( ROOM_W/2+WALL_T/2,wh,0));
  world.addBody(roomBody);

  roomGroup=new THREE.Group(); scene.add(roomGroup);
  // floor
  const fl=new THREE.Mesh(new THREE.BoxGeometry(ROOM_W,0.35,ROOM_D),
    new THREE.MeshStandardMaterial({color:sc.base,roughness:0.9}));
  fl.position.y=-0.175; fl.receiveShadow=true; roomGroup.add(fl);
  // floor top (home: 畳調 / office: タイルカーペット)
  const top=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,ROOM_D),
    new THREE.MeshStandardMaterial({color:sc.floor,roughness:0.95}));
  top.rotation.x=-Math.PI/2; top.position.y=0.001; top.receiveShadow=true; roomGroup.add(top);
  if(sc.tile>0){ // カーペットタイル目地
    const pts=[];
    for(let x=-ROOM_W/2+sc.tile;x<ROOM_W/2-1e-6;x+=sc.tile)
      pts.push(new THREE.Vector3(x,0.003,-ROOM_D/2),new THREE.Vector3(x,0.003,ROOM_D/2));
    for(let z=-ROOM_D/2+sc.tile;z<ROOM_D/2-1e-6;z+=sc.tile)
      pts.push(new THREE.Vector3(-ROOM_W/2,0.003,z),new THREE.Vector3(ROOM_W/2,0.003,z));
    roomGroup.add(new THREE.LineSegments(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0x878d95,transparent:true,opacity:0.5})));
  }
  // walls (semi-transparent, north & west visible)
  const wallMat=new THREE.MeshStandardMaterial({color:0xdfe6ee,transparent:true,opacity:0.28,side:THREE.DoubleSide});
  const wN=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,ROOM_H),wallMat);
  wN.position.set(0,ROOM_H/2,-ROOM_D/2); roomGroup.add(wN);
  const wW=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_D,ROOM_H),wallMat);
  wW.rotation.y=Math.PI/2; wW.position.set(-ROOM_W/2,ROOM_H/2,0); roomGroup.add(wW);
  // ceiling edge frame
  const frame=new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(ROOM_W,ROOM_H,ROOM_D)),
    new THREE.LineBasicMaterial({color:0x4a5a70}));
  frame.position.y=ROOM_H/2; roomGroup.add(frame);
  // N arrow marker
  const arrow=new THREE.ArrowHelper(new THREE.Vector3(0,0,-1),new THREE.Vector3(ROOM_W/2+0.5,0.02,0),0.7,0x5aa2ff,0.2,0.12);
  roomGroup.add(arrow);
}

/* ---- furniture builders ---- */
let roomOffset={px:0,py:0,pz:0,vx:0,vy:0,vz:0};
function stdMat(color,rough){return new THREE.MeshStandardMaterial({color,roughness:rough??0.8});}
function edged(mesh){
  mesh.castShadow=true;mesh.receiveShadow=true;
  const g=new THREE.Group();g.add(mesh);
  g.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry),
    new THREE.LineBasicMaterial({color:0x11151a})));
  g.position.copy(mesh.position);mesh.position.set(0,0,0);
  return g;
}
const _matCache={};
function furnPhysMat(def){
  const key=def.id+"_"+def.mu;
  if(!_matCache[key]){
    const m=new CANNON.Material(key);
    world.addContactMaterial(new CANNON.ContactMaterial(floorMat,m,
      {friction:def.mu,restitution:0.0,frictionEquationStiffness:1e8,frictionEquationRelaxation:3}));
    _matCache[key]=m;
  }
  return _matCache[key];
}
function newBody(def,centerY,mass){
  const mat=furnPhysMat(def);
  // 反発係数：重量家具と床（畳・床材）の接触は実質的に非弾性（衝突エネルギーは
  // 構造の変形・摩擦でほぼ吸収され、跳ね返りはごく僅か）。0.15は現実の家具-床
  // 接触としては過大な値で、主要動での着地や転倒直後に微小バウンドが
  // (linearDamping/angularDampingが0.01と小さいため)ほとんど減衰せず残留し、
  // その空中区間では床との接触が検出できず摩擦固着(applyStiction)が働かないため、
  // 後続の緩やかな長周期動に一方向へ持っていかれてクリープする原因になっていた。
  const body=new CANNON.Body({mass:mass??def.mass,material:mat});
  body.position.set(def.pos[0]+roomOffset.px,
                    centerY+(def.y0||0)+0.002+roomOffset.py,
                    def.pos[1]+roomOffset.pz);
  if(def.face)body.quaternion.setFromAxisAngle(new CANNON.Vec3(0,1,0),def.face*Math.PI/2);
  body.velocity.set(roomOffset.vx,roomOffset.vy,roomOffset.vz);
  body.linearDamping=0.01;body.angularDamping=0.01;body.allowSleep=false;
  return body;
}
function finishFurn(def,body,g){
  world.addBody(body);scene.add(g);
  return {def,body,mesh:g,
    startPos:new CANNON.Vec3(def.pos[0],body.position.y-roomOffset.py,def.pos[1]),
    fallen:false,slid:false,stuck:true};
}

function makeBoxFurn(def){
  const {mass,cogY}=furnCfg(def), cY=cogY;
  const body=newBody(def,cY,mass);
  body.addShape(new CANNON.Box(new CANNON.Vec3(def.w/2,def.h/2,def.d/2)),
                new CANNON.Vec3(0,def.h/2-cY,0));
  const g=new THREE.Group();
  const main=new THREE.Mesh(new THREE.BoxGeometry(def.w,def.h,def.d),stdMat(def.color));
  main.position.y=def.h/2-cY;
  g.add(edged(main));
  if(def.id==="bookshelf"||def.id==="chest"){
    const nsh=def.id==="bookshelf"?4:2;
    for(let i=1;i<=nsh;i++){
      const sh=new THREE.Mesh(new THREE.BoxGeometry(def.w*0.96,0.02,def.d*0.9),stdMat(0x3a2a1a));
      sh.position.y=def.h*i/(nsh+1)-cY;g.add(sh);
    }
  }
  if(def.id==="fridge"){
    const hd=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.5,0.03),stdMat(0x808a94));
    hd.position.set(def.w/2+0.02,def.h*0.65-cY,def.d/4);g.add(hd);
  }
  if(def.id==="cbox"){ // ガムテープ
    const tape=new THREE.Mesh(new THREE.BoxGeometry(0.07,def.h*1.004,def.d*1.004),stdMat(0x8a6a3a,0.9));

function makeDesk(def){ // 天板＋4脚の複合剛体

  for(const sx of[-1,1])for(const sz of[-1,1]){

/* 吊りコード（拘束＋描画線）共通生成
   pivotLocal: 拘束点（ボディ系、紐上端に置く） drawLocal: 線の下端描画点（ボディ側取付部） */
function mkCord(body,pivotLocal,anchorLocal,drawLocal){
  const c=new CANNON.PointToPointConstraint(body,pivotLocal,roomBody,anchorLocal);
  world.addConstraint(c);
  const line=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),new THREE.Vector3()]),
    new THREE.LineBasicMaterial({color:0x9aa4b2}));
  scene.add(line);
  return {constraint:c,pivotLocal,anchorLocal,drawLocal:drawLocal||pivotLocal,line};
}
function makeLamp(def){
  const body=new CANNON.Body({mass:furnCfg(def).mass});
  body.addShape(new CANNON.Sphere(0.10));
  body.position.set(def.pos[0]+roomOffset.px,ROOM_H-def.cord+roomOffset.py,def.pos[1]+roomOffset.pz);
  body.velocity.set(roomOffset.vx,roomOffset.vy,roomOffset.vz);
  body.linearDamping=0.02;body.allowSleep=false;
  world.addBody(body);
  const cords=[mkCord(body,new CANNON.Vec3(0,def.cord,0),
                      new CANNON.Vec3(def.pos[0],ROOM_H,def.pos[1]))];
  const g=new THREE.Group();
  const shade=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.16,20,1,true),
    new THREE.MeshStandardMaterial({color:0x35404d,side:THREE.DoubleSide}));
  shade.position.y=0.06;g.add(shade);
  const bulb=new THREE.Mesh(new THREE.SphereGeometry(0.05,12,10),
    new THREE.MeshStandardMaterial({color:def.color,emissive:0xf5d67a,emissiveIntensity:0.9}));
  g.add(bulb);
  const pt=new THREE.PointLight(0xffe6b0,0.6,5);g.add(pt);
  scene.add(g);
  return {def,body,mesh:g,cords,restX:def.pos[0],restZ:def.pos[1],cordLen:def.cord,
          startPos:body.position.clone(),fallen:false,slid:false};
}

/* LED蛍光灯（バー両端を天井から紐で吊る） */
function makeLampBar(def){
  const cfg=furnCfg(def), L=def.len, hw=L/2;
  const body=new CANNON.Body({mass:cfg.mass});
  body.addShape(new CANNON.Box(new CANNON.Vec3(hw,0.028,0.07)));
  body.position.set(def.pos[0]+roomOffset.px,ROOM_H-def.cord-0.028+roomOffset.py,def.pos[1]+roomOffset.pz);
  body.velocity.set(roomOffset.vx,roomOffset.vy,roomOffset.vz);
  body.linearDamping=0.03;body.angularDamping=0.05;body.allowSleep=false;
  world.addBody(body);
  const cords=[];
  for(const s of[-1,1])
    cords.push(mkCord(body,
      new CANNON.Vec3(s*hw*0.9,def.cord+0.028,0),      // 拘束点=紐上端（剛リンク近似）
      new CANNON.Vec3(def.pos[0]+s*hw*0.9,ROOM_H,def.pos[1]),
      new CANNON.Vec3(s*hw*0.9,0.028,0)));             // 描画はバー上面へ
  const g=new THREE.Group();
  const housing=new THREE.Mesh(new THREE.BoxGeometry(L,0.055,0.14),stdMat(0xd6dae0,0.5));
  housing.castShadow=true;g.add(housing);
  const panel=new THREE.Mesh(new THREE.BoxGeometry(L*0.96,0.012,0.10),
    new THREE.MeshStandardMaterial({color:def.color,emissive:0xf0f4fa,emissiveIntensity:1.1}));
  panel.position.y=-0.030;g.add(panel);

  return {def,body,mesh:g,cords,restX:def.pos[0],restZ:def.pos[1],cordLen:def.cord,
          startPos:body.position.clone(),fallen:false,slid:false};
}

/* オフィスデスク：平机(ped=0)/片袖机(ped=1)/両袖机(ped=2) */
function makePDesk(def){
  const {mass,cogY}=furnCfg(def), cY=cogY, topT=0.03;
  const pedW=0.42, pedH=def.h-topT, legT=0.035;
  const body=newBody(def,cY,mass);
  body.addShape(new CANNON.Box(new CANNON.Vec3(def.w/2,topT/2,def.d/2)),
                new CANNON.Vec3(0,def.h-topT/2-cY,0));
  const g=new THREE.Group();
  const top=new THREE.Mesh(new THREE.BoxGeometry(def.w,topT,def.d),stdMat(def.color,0.5));
  top.position.y=def.h-topT/2-cY;g.add(edged(top));
  const sides=[]; // {x, ped:bool}
  sides.push({x: def.w/2-pedW/2-0.01, ped:def.ped>=1});
  sides.push({x:-def.w/2+pedW/2+0.01, ped:def.ped>=2});
  for(const s of sides){
    if(s.ped){ // 袖（引き出しユニット）
      body.addShape(new CANNON.Box(new CANNON.Vec3(pedW/2,pedH/2,def.d/2*0.94)),
                    new CANNON.Vec3(s.x,pedH/2-cY,0));
      const ped=new THREE.Mesh(new THREE.BoxGeometry(pedW,pedH,def.d*0.94),stdMat(0xb9bfc7,0.6));
      ped.position.set(s.x,pedH/2-cY,0);g.add(edged(ped));
      for(let i=0;i<3;i++){ // 引き出し前板＋取っ手
        const fh=pedH/3-0.015;
        const face=new THREE.Mesh(new THREE.BoxGeometry(pedW*0.92,fh,0.012),stdMat(0xcbd1d8,0.55));
        face.position.set(s.x,pedH*(i+0.5)/3-cY,def.d*0.47+0.006);g.add(face);
        const hdl=new THREE.Mesh(new THREE.BoxGeometry(pedW*0.5,0.015,0.015),stdMat(0x5a636e,0.4));
        hdl.position.set(s.x,pedH*(i+1)/3-0.04-cY,def.d*0.47+0.016);g.add(hdl);
      }
    }else{ // パネル脚
      const lx=Math.sign(s.x)*(def.w/2-legT/2-0.02);
      body.addShape(new CANNON.Box(new CANNON.Vec3(legT/2,pedH/2,def.d/2*0.86)),
                    new CANNON.Vec3(lx,pedH/2-cY,0));
      const leg=new THREE.Mesh(new THREE.BoxGeometry(legT,pedH,def.d*0.86),stdMat(0x9aa1a9,0.6));
      leg.position.set(lx,pedH/2-cY,0);leg.castShadow=true;g.add(leg);
    }
  }
  // 幕板
  const mod=new THREE.Mesh(new THREE.BoxGeometry(def.w*0.8,pedH*0.45,0.015),stdMat(0xaab0b8,0.7));
  mod.position.set(0,def.h-topT-pedH*0.45/2-0.02-cY,-def.d*0.44);g.add(mod);
  return finishFurn(def,body,g);
}

/* オフィスチェア：5本脚キャスターベース＋ガス柱＋座面＋背もたれ */
function makeOfficeChair(def){
  const {mass,cogY}=furnCfg(def), cY=cogY;
  const baseR=0.29, baseT=0.05, colR=0.028, seatT=0.07;
  const body=newBody(def,cY,mass);
  body.addShape(new CANNON.Box(new CANNON.Vec3(baseR*0.82,baseT/2,baseR*0.82)),
                new CANNON.Vec3(0,baseT/2-cY,0));
  body.addShape(new CANNON.Box(new CANNON.Vec3(colR,(def.seatH-baseT-seatT)/2,colR)),
                new CANNON.Vec3(0,(def.seatH-seatT+baseT)/2-cY,0));
  body.addShape(new CANNON.Box(new CANNON.Vec3(def.w/2,seatT/2,def.d/2)),
                new CANNON.Vec3(0,def.seatH-seatT/2-cY,0));
  const backH=def.h-def.seatH;
  body.addShape(new CANNON.Box(new CANNON.Vec3(def.w/2*0.92,backH/2,0.03)),
                new CANNON.Vec3(0,def.seatH+backH/2-cY,def.d/2-0.03));
  const g=new THREE.Group();
  for(let i=0;i<5;i++){ // 5本脚＋キャスター
    const a=i/5*Math.PI*2;
    const arm=new THREE.Mesh(new THREE.BoxGeometry(baseR,0.035,0.05),stdMat(0x3a424c,0.5));
    arm.position.set(Math.cos(a)*baseR/2,baseT-0.01-cY,Math.sin(a)*baseR/2);
    arm.rotation.y=-a;arm.castShadow=true;g.add(arm);
    const cas=new THREE.Mesh(new THREE.SphereGeometry(0.033,10,8),stdMat(0x22282f,0.4));
    cas.position.set(Math.cos(a)*baseR*0.92,0.033-cY,Math.sin(a)*baseR*0.92);g.add(cas);
  }
  const col=new THREE.Mesh(new THREE.CylinderGeometry(colR,colR*1.3,def.seatH-baseT-seatT,12),stdMat(0x555e69,0.4));
  col.position.y=(def.seatH-seatT+baseT)/2-cY;g.add(col);
  const seat=new THREE.Mesh(new THREE.BoxGeometry(def.w,seatT,def.d),stdMat(def.color,0.85));
  seat.position.y=def.seatH-seatT/2-cY;g.add(edged(seat));
  const back=new THREE.Mesh(new THREE.BoxGeometry(def.w*0.92,backH,0.06),stdMat(def.color,0.85));
  back.position.set(0,def.seatH+backH/2-cY,def.d/2-0.03);g.add(edged(back));
  return finishFurn(def,body,g);
}

/* 液晶ディスプレイ：台座＋支柱＋パネル（画面法線 = ローカル+z） */

/* フロアパーテーション：パネル＋両端T字脚 */
function makePartition(def){
  const {mass,cogY}=furnCfg(def), cY=cogY;
  const panT=0.04, footH=0.035, footL=def.d, footW=0.06;
  const body=newBody(def,cY,mass);
  body.addShape(new CANNON.Box(new CANNON.Vec3(def.w/2,(def.h-footH)/2,panT/2)),
                new CANNON.Vec3(0,footH+(def.h-footH)/2-cY,0));
  for(const s of[-1,1])
    body.addShape(new CANNON.Box(new CANNON.Vec3(footW/2,footH/2,footL/2)),
                  new CANNON.Vec3(s*(def.w/2-footW/2),footH/2-cY,0));
  const g=new THREE.Group();
  const pan=new THREE.Mesh(new THREE.BoxGeometry(def.w,def.h-footH,panT),stdMat(def.color,0.9));
  pan.position.y=footH+(def.h-footH)/2-cY;g.add(edged(pan));
  const fr=new THREE.Mesh(new THREE.BoxGeometry(def.w*1.01,0.04,panT*1.2),stdMat(0x59636e,0.5));
  fr.position.y=def.h-0.02-cY;g.add(fr);
  for(const s of[-1,1]){
    const foot=new THREE.Mesh(new THREE.BoxGeometry(footW,footH,footL),stdMat(0x59636e,0.5));
    foot.position.set(s*(def.w/2-footW/2),footH/2-cY,0);foot.castShadow=true;g.add(foot);
  }
  return finishFurn(def,body,g);
}

/* 複合機：本体＋操作パネル＋トレイ、四隅キャスター（低摩擦） */
function makeCopier(def){
  const {mass,cogY}=furnCfg(def), cY=cogY;
  const casR=0.045, bodyH=def.h-casR*2;
  const body=newBody(def,cY,mass);
  body.addShape(new CANNON.Box(new CANNON.Vec3(def.w/2,bodyH/2,def.d/2)),
                new CANNON.Vec3(0,casR*2+bodyH/2-cY,0));
  for(const sx of[-1,1])for(const sz of[-1,1])
    body.addShape(new CANNON.Sphere(casR),
      new CANNON.Vec3(sx*(def.w/2-casR*1.3),casR-cY,sz*(def.d/2-casR*1.3)));
  const g=new THREE.Group();
  const main=new THREE.Mesh(new THREE.BoxGeometry(def.w,bodyH,def.d),stdMat(def.color,0.5));
  main.position.y=casR*2+bodyH/2-cY;g.add(edged(main));
  const dark=new THREE.Mesh(new THREE.BoxGeometry(def.w*1.005,bodyH*0.22,def.d*1.005),stdMat(0x3a424c,0.55));
  dark.position.y=casR*2+bodyH*0.45-cY;g.add(dark);
  const cp=new THREE.Mesh(new THREE.BoxGeometry(def.w*0.6,0.02,0.22),stdMat(0x2a3138,0.4));
  cp.position.set(0,def.h-cY+0.01,def.d/2-0.08);cp.rotation.x=-0.25;g.add(cp);
  const tray=new THREE.Mesh(new THREE.BoxGeometry(def.w*0.8,0.015,0.28),stdMat(0xcfd4da,0.6));
  tray.position.set(0,casR*2+bodyH*0.62-cY,-def.d/2-0.10);g.add(tray);
  for(const sx of[-1,1])for(const sz of[-1,1]){
    const cas=new THREE.Mesh(new THREE.SphereGeometry(casR,10,8),stdMat(0x22282f,0.4));
    cas.position.set(sx*(def.w/2-casR*1.3),casR-cY,sz*(def.d/2-casR*1.3));g.add(cas);
  }
  return finishFurn(def,body,g);
}

const BUILDERS={box:makeBoxFurn,desk:makeDesk,chair:makeChair,bed:makeBed,lamp:makeLamp,
                lampbar:makeLampBar,pdesk:makePDesk,ochair:makeOfficeChair,monitor:makeMonitor,
                cabinet:makeCabinet,partition:makePartition,copier:makeCopier};

function clearFurniture(){
  for(const f of furniture){
    world.remove(f.body);
    if(f.cords)for(const c of f.cords){world.removeConstraint(c.constraint);scene.remove(c.line);}
    scene.remove(f.mesh);
  }
  furniture=[];
}
function startT(){
  if(!proc)return 0;
  const v=parseFloat(document.getElementById("startSkip").value)||0;
  return Math.min(Math.max(v,0),Math.max(proc.dur-1,0));
}
function placeFurniture(){
  stopSimCore();
  clearFurniture();
  if(proc){ tablePose(startT(),roomOffset); }
  else roomOffset={px:0,py:0,pz:0,vx:0,vy:0,vz:0};
  roomBody.position.set(roomOffset.px,roomOffset.py,roomOffset.pz);
  roomBody.velocity.set(0,0,0);
  roomGroup.position.set(roomOffset.px,roomOffset.py,roomOffset.pz);
  for(const def of sceneFurn()){
    const chk=document.getElementById("chk_"+def.id);
    if(!chk||!chk.checked) continue;
    const units=def.units||[{pos:def.pos,face:def.face||0,y0:def.y0||0}];
    units.forEach((u,i)=>{
      const d=Object.assign({},def,{pos:u.pos,face:u.face||0,y0:u.y0||0,
        name:def.name+(units.length>1?` #${i+1}`:"")});
      furniture.push(BUILDERS[def.kind](d));
    });
  }
  updateStatus();
}

/* =====================================================================
 * 5. simulation loop — 振動台駆動（変位・速度をキネマティック剛体に付与）
 *    軸対応: X=EW(+東), Z=NS(+南→画面手前), Y=UD(+上)
 * ===================================================================== */
function sampleWave(arr,t){ // linear interp, cm→m
  const i=t/proc.dt;
  const i0=Math.floor(i);
  if(i0>=proc.n-1)return arr[proc.n-1]*0.01;
  const f=i-i0;
  return (arr[i0]*(1-f)+arr[i0+1]*f)*0.01;
}
function axIdx(){ // 加振軸への成分割当（入替時: NS記録→EW軸, EW記録→NS軸）
  return document.getElementById("swapNSEW").checked?{ns:1,ew:0}:{ns:0,ew:1};
}
function tablePose(t,out){
  const s=parseFloat(document.getElementById("ampScale").value)||1;
  const {ns,ew}=axIdx();
  out.px= sampleWave(proc.dsp[ew],t)*s;          // EW軸 → X
  out.pz=-sampleWave(proc.dsp[ns],t)*s;          // NS軸 → -Z (北=-Z)
  out.py= sampleWave(proc.dsp[2],t)*s;           // UD → Y
  out.vx= sampleWave(proc.vel[ew],t)*s;
  out.vz=-sampleWave(proc.vel[ns],t)*s;
  out.vy= sampleWave(proc.vel[2],t)*s;
  out.ax= sampleWave(proc.acc[ew],t)*s;          // m/s^2
  out.az=-sampleWave(proc.acc[ns],t)*s;
  out.ay= sampleWave(proc.acc[2],t)*s;
}
const _pose={px:0,py:0,pz:0,vx:0,vy:0,vz:0,ax:0,ay:0,az:0};

let lastFrame=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dtReal=Math.min((ts-lastFrame)/1000,0.05); lastFrame=ts;
  if(running&&proc){
    const speed=parseFloat(document.getElementById("speed").value);
    simT=Math.min(simT+dtReal*speed,proc.dur);
    while(physT<simT){
      physT+=PHYS_DT;
      tablePose(physT,_pose);
      roomBody.position.set(_pose.px,_pose.py,_pose.pz);
      roomBody.velocity.set(_pose.vx,_pose.vy,_pose.vz);
      world.step(PHYS_DT);
      applyStiction();
    }
    roomGroup.position.set(_pose.px,_pose.py,_pose.pz);
    document.getElementById("timeRead").textContent=simT.toFixed(1)+" s";
    if(simT>=proc.dur){ running=false; btnRun.textContent="加振開始"; msg("加振終了"); }
    updateStatus();
    drawCursor();
    updateAccHud();
    drawOrbit();
  }
  // sync meshes
  const _pv=new CANNON.Vec3();
  for(const f of furniture){
    f.mesh.position.copy(f.body.position);
    f.mesh.quaternion.copy(f.body.quaternion);
    if(f.cords)for(const c of f.cords){
      f.body.quaternion.vmult(c.drawLocal,_pv);
      const pts=c.line.geometry.attributes.position.array;
      pts[0]=c.anchorLocal.x+roomBody.position.x;
      pts[1]=c.anchorLocal.y+roomBody.position.y;
      pts[2]=c.anchorLocal.z+roomBody.position.z;
      pts[3]=f.body.position.x+_pv.x;
      pts[4]=f.body.position.y+_pv.y;
      pts[5]=f.body.position.z+_pv.z;
      c.line.geometry.attributes.position.needsUpdate=true;
    }
  }
  renderer.render(scene,camera);
}

/* 静止摩擦の近似：cannonの動摩擦モデルは微小クリープが残り「氷上滑走」化するため、
   床接触中かつ 相対滑り速度が小さく、追従に要する慣性力 m·|a_table| が
   静止摩擦力 μ·m·(g+a_y) を下回るときは床（振動台）に速度を固着させる。
   ---
   【ヒステリシス付与】固着／滑走の判定を単一のしきい値のみで毎物理ステップ
   （240Hz）独立に評価すると、しきい値をまたぐ僅かなノイズだけで固着↔滑走が
   高頻度に反転する。反転のたびに一瞬 cannon 本来の（上記コメント通り不完全な）
   動摩擦解決に委ねられ、そこで生じた僅かな位置誤差は再固着時も戻されない
   （速度のみ合わせ位置は補正しない、という設計自体は妥当）。長周期のゆったりした
   水平動が重なっていると、この「一瞬だけ滑る」向きが何サイクルにもわたって
   ほぼ同じ方向に偏るため、誤差が一方向に積算され「スケートリンク」化する。
   実際の摩擦は現象として次の2つのヒステリシスを持つ：
   ①静止摩擦係数 μs は動摩擦係数 μk よりやや大きい（木材・畳・カーペット等で
     概ね1.2〜1.4倍程度）→ 固着中は高いμs基準を超えるまで外れない。
   ②いったん滑り出すと Stribeck 効果により、再び静止状態へ落ち着くには
     相対速度・回転が「離脱を判定した速度」より十分小さくなる必要がある
     （同一の境界で切り返すと実速度には表れない微小変動でも往復してしまう）。
   この①②の非対称性を判定に反映し、固着中は高い基準でしか離脱せず、滑走中は
   低い基準まで収まらないと再固着しないようにすることで、大きく滑って停止した
   直後に残る微小な残留速度・回転ノイズが単一閾値を跨ぎ続けて生じる
   一方向クリープの再発を防ぐ（摩擦係数・積分手法など計算そのものは変更しない）。 */
const SLIP_BREAK=0.08, SLIP_LOCK=0.03;   // 相対滑り速度：離脱／再固着のしきい値(m/s)
const SPIN_BREAK=0.35, SPIN_LOCK=0.15;   // 角速度：離脱／再固着のしきい値(rad/s)
const MUS_OVER_MUK=1.3; // 静止摩擦係数/動摩擦係数の代表的な比（木材・畳・カーペット等）
function applyStiction(){
  if(!furniture.length)return;
  const inContact=new Set();
  for(const c of world.contacts){
    if(c.bi===roomBody)inContact.add(c.bj);
    else if(c.bj===roomBody)inContact.add(c.bi);
  }
  const gN=Math.max(9.81+_pose.ay,0);   // 法線方向実効重力（上下動で増減）
  const demand=Math.hypot(_pose.ax,_pose.az);
  for(const f of furniture){
    if(f.def.lamp)continue;
    if(!inContact.has(f.body)){f.stuck=false;continue;}
    const rv=Math.hypot(f.body.velocity.x-_pose.vx,f.body.velocity.z-_pose.vz);
    const spin=f.body.angularVelocity.norm();
    if(f.stuck===undefined)f.stuck=(rv<SLIP_LOCK&&spin<SPIN_LOCK);
    // 固着中は「離脱」基準（高）、滑走中は「再固着」基準（低）を使い分ける
    const slipLimit=f.stuck?SLIP_BREAK:SLIP_LOCK;
    const spinLimit=f.stuck?SPIN_BREAK:SPIN_LOCK;
    const muLimit=f.def.mu*gN*(f.stuck?MUS_OVER_MUK:1);
    if(rv>=slipLimit||spin>=spinLimit||demand>=muLimit*0.95){
      f.stuck=false;                                          // 限界超過→滑り継続
      continue;
    }

    f.stuck=true;
    f.body.velocity.x=_pose.vx;
    f.body.velocity.z=_pose.vz;
    f.body.angularVelocity.scale(0.6,f.body.angularVelocity);
  }
}

function updateStatus(){
  const el=document.getElementById("status");
  if(!furniture.length){el.innerHTML='<span class="ok">— 未配置 —</span>';return;}
  const up=new CANNON.Vec3(0,1,0), tmp=new CANNON.Vec3();
  let html="";
  for(const f of furniture){
    if(f.def.lamp){
      const dx=f.body.position.x-(f.restX+roomBody.position.x);
      const dz=f.body.position.z-(f.restZ+roomBody.position.z);
      const ang=Math.atan2(Math.hypot(dx,dz),f.cordLen)*180/Math.PI;
      html+=`<div class="item"><span>${f.def.name}</span><span class="mono ${ang>20?'slide':'ok'}">振れ ${ang.toFixed(0)}°</span></div>`;
      continue;
    }
    f.body.quaternion.vmult(up,tmp);
    const tilt=Math.acos(Math.max(-1,Math.min(1,tmp.y)))*180/Math.PI;
    if(tilt>45)f.fallen=true;
    const relx=f.body.position.x-roomBody.position.x-f.startPos.x;
    const relz=f.body.position.z-roomBody.position.z-f.startPos.z;
    const slide=Math.hypot(relx,relz)*100;
    if(slide>5)f.slid=true;
    let st,cls;
    if(f.fallen){st="転倒";cls="fall";}
    else if(f.slid){st=`移動 ${slide.toFixed(0)}cm`;cls="slide";}
    else {st=`傾き ${tilt.toFixed(0)}°`;cls="ok";}
    html+=`<div class="item"><span>${f.def.name}</span><span class="mono ${cls}">${st}</span></div>`;
  }
  el.innerHTML=html;
}

/* =====================================================================
 * 6. waveform charts
 * ===================================================================== */
const chartIds=["cA","cV","cD"];
const compColors=["#5aa2ff","#3ddc97","#aab4c4"];
function sizeCharts(){
  for(const id of chartIds){
    const c=document.getElementById(id);
    const r=c.getBoundingClientRect();
    if(r.width>0){c.width=r.width*devicePixelRatio;c.height=r.height*devicePixelRatio;}
  }
}
let cursorPrev=-1;
function drawCursor(force){
  if(!proc)return;
  const frac=simT/proc.dur;
  if(!force&&Math.abs(frac-cursorPrev)<0.002)return;
  cursorPrev=frac;
  drawChartsBase();
}
function drawChartsBase(){
  drawChartsStatic();
  const frac=simT/proc.dur;
  for(const id of chartIds){
    const c=document.getElementById(id),g=c.getContext("2d");
    g.strokeStyle="#ffffff";g.lineWidth=1;
    g.beginPath();g.moveTo(frac*c.width,0);g.lineTo(frac*c.width,c.height);g.stroke();
  }
}
let staticCache=null;
function drawChartsStatic(){
  if(!staticCache){drawChartsRaw();cacheStatic();}
  for(let i=0;i<3;i++){
    const c=document.getElementById(chartIds[i]);
    c.getContext("2d").putImageData(staticCache[i],0,0);
  }
}
function cacheStatic(){
  staticCache=chartIds.map(id=>{
    const c=document.getElementById(id);
    return c.getContext("2d").getImageData(0,0,c.width,c.height);
  });
}
function drawChartsRaw(){
  const sets=[proc.acc,proc.vel,proc.dsp];
  for(let s=0;s<3;s++){
    const c=document.getElementById(chartIds[s]),g=c.getContext("2d");
    const W=c.width,H=c.height;
    g.clearRect(0,0,W,H);
    let mx=0;
    for(const arr of sets[s])for(let i=0;i<arr.length;i++){const v=Math.abs(arr[i]);if(v>mx)mx=v;}
    if(mx===0)mx=1;
    g.strokeStyle="#2a3442";g.beginPath();g.moveTo(0,H/2);g.lineTo(W,H/2);g.stroke();
    for(let comp=0;comp<3;comp++){
      const arr=sets[s][comp];
      g.strokeStyle=compColors[comp];g.lineWidth=1;g.beginPath();
      for(let px=0;px<W;px++){
        const i0=Math.floor(px/W*arr.length), i1=Math.floor((px+1)/W*arr.length);
        let lo=1e9,hi=-1e9;
        for(let i=i0;i<Math.max(i1,i0+1);i++){const v=arr[i];if(v<lo)lo=v;if(v>hi)hi=v;}
        g.moveTo(px+0.5,H/2-lo/mx*H/2*0.92);g.lineTo(px+0.5,H/2-hi/mx*H/2*0.92);
      }
      g.stroke();
    }
    g.fillStyle="#8593a5";g.font=`${10*devicePixelRatio}px monospace`;
    g.fillText("±"+mx.toFixed(1),4*devicePixelRatio,12*devicePixelRatio);
  }
}

/* ---- 変位軌跡（オービット）NS-EW ---- */
let orbitCache=null, orbitMx=1;
function orbitShown(){return document.getElementById("orbitPanel").classList.contains("show");}
function niceStep(mx){const e=Math.pow(10,Math.floor(Math.log10(mx)));
  for(const m of[1,2,5,10])if(m*e>=mx/2.2)return m*e; return e;}
function drawOrbitStatic(){
  const c=document.getElementById("orbitCanvas"),g=c.getContext("2d");
  const W=c.width=c.clientWidth*devicePixelRatio||230,H=c.height=c.clientHeight*devicePixelRatio||230;
  g.clearRect(0,0,W,H);
  orbitCache=null;
  if(!proc)return;
  const s=parseFloat(document.getElementById("ampScale").value)||1;
  const {ns,ew}=axIdx(), X=proc.dsp[ew], Y=proc.dsp[ns];
  let mx=0;
  for(let i=0;i<proc.n;i++){const v=Math.max(Math.abs(X[i]),Math.abs(Y[i]));if(v>mx)mx=v;}
  orbitMx=Math.max(mx*s,1e-6);
  const cx=W/2, cy=H/2, R=Math.min(W,H)/2*0.88, sc=R/orbitMx;
  // 目盛リング＋十字
  const step=niceStep(orbitMx);
  g.strokeStyle="#233040";g.fillStyle="#5d6b7d";g.font=`${9*devicePixelRatio}px monospace`;
  for(let r=step;r<=orbitMx*1.001;r+=step){
    g.beginPath();g.arc(cx,cy,r*sc,0,Math.PI*2);g.stroke();
    g.fillText(r.toFixed(step<1?1:0),cx+r*sc+2,cy-2);
  }
  g.beginPath();g.moveTo(cx-R,cy);g.lineTo(cx+R,cy);g.moveTo(cx,cy-R);g.lineTo(cx,cy+R);g.stroke();
  g.fillStyle="#8593a5";
  g.fillText("N",cx-3*devicePixelRatio,cy-R-3);
  g.fillText("E",cx+R+3,cy+3*devicePixelRatio);
  g.fillText("cm",4,H-6);
  // 全軌跡（淡色・間引き）
  g.strokeStyle="rgba(90,162,255,0.35)";g.lineWidth=1;g.beginPath();
  const dec=Math.max(1,Math.floor(proc.n/6000));
  for(let i=0;i<proc.n;i+=dec){
    const px=cx+X[i]*s*sc, py=cy-Y[i]*s*sc;
    i===0?g.moveTo(px,py):g.lineTo(px,py);
  }
  g.stroke();
  orbitCache=g.getImageData(0,0,W,H);
  orbitCache._geo={cx,cy,sc};
}
function drawOrbit(){
  if(!orbitShown())return;
  const c=document.getElementById("orbitCanvas"),g=c.getContext("2d");
  if(!proc){g.clearRect(0,0,c.width,c.height);return;}
  if(!orbitCache)drawOrbitStatic();
  if(!orbitCache)return;
  g.putImageData(orbitCache,0,0);
  const {cx,cy,sc}=orbitCache._geo;
  const s=parseFloat(document.getElementById("ampScale").value)||1;
  const {ns,ew}=axIdx(), X=proc.dsp[ew], Y=proc.dsp[ns];
  const i1=Math.min(Math.floor(simT/proc.dt),proc.n-1);
  const i0=Math.max(0,i1-Math.round(2/proc.dt)); // 直近2秒トレイル
  g.strokeStyle="#f5b942";g.lineWidth=1.6*devicePixelRatio;g.beginPath();
  for(let i=i0;i<=i1;i++){
    const px=cx+X[i]*s*sc, py=cy-Y[i]*s*sc;
    i===i0?g.moveTo(px,py):g.lineTo(px,py);
  }
  g.stroke();
  g.fillStyle="#ffffff";
  g.beginPath();g.arc(cx+X[i1]*s*sc,cy-Y[i1]*s*sc,3*devicePixelRatio,0,Math.PI*2);g.fill();
}

/* ---- 直近1秒最大加速度HUD ---- */
function updateAccHud(){
  const el=document.getElementById("accRead");
  if(!proc){el.textContent="—";return;}
  const s=parseFloat(document.getElementById("ampScale").value)||1;
  const i1=Math.min(Math.floor(simT/proc.dt),proc.n-1);
  const i0=Math.max(0,i1-Math.round(1/proc.dt));
  let mx=0;
  for(let i=i0;i<=i1;i++){
    const A=Math.hypot(proc.acc[0][i],proc.acc[1][i],proc.acc[2][i]);
    if(A>mx)mx=A;
  }
  el.textContent=(mx*s).toFixed(1);
}

const btnRun=document.getElementById("btnRun");
function msg(t){
  const m=document.getElementById("msg");
  m.textContent=t;m.style.display="block";
  clearTimeout(msg._tm);msg._tm=setTimeout(()=>m.style.display="none",2600);

function buildFurnList(){
  const el=document.getElementById("furnList");
  el.innerHTML=sceneFurn().map(f=>{
    const n=f.units?f.units.length:1;
    const spec=f.lamp?`紐${f.cord}m`:`${f.h}m / μ${f.mu}`;
    const cfg=f.lamp
      ?`<div class="cfg"><span>質量</span><input type="number" id="m_${f.id}" value="${f.mass}" min="0.5" step="0.5">kg</div>`
      :`<div class="cfg"><span>質量</span><input type="number" id="m_${f.id}" value="${f.mass}" min="1" step="1">kg
         <span>重心高</span><input type="number" id="cg_${f.id}" value="50" min="10" max="90" step="5">%</div>`;
    return `<label class="chk"><input type="checkbox" id="chk_${f.id}" ${f.on?"checked":""}>
      <span>${f.name}${n>1?` ×${n}`:""}</span><span class="spec">${spec}</span></label>${cfg}`;
  }).join("");
  el.querySelectorAll(".cfg input").forEach(i=>i.addEventListener("change",()=>placeFurniture()));
  el.querySelectorAll("input[type=checkbox]").forEach(i=>i.addEventListener("change",()=>placeFurniture()));
}
function furnCfg(def){
  const mEl=document.getElementById("m_"+def.id);
  const mass=Math.max(0.5,parseFloat(mEl&&mEl.value)||def.mass);
  if(def.lamp)return {mass,cogY:0};
  const cEl=document.getElementById("cg_"+def.id);
  const r=Math.min(0.9,Math.max(0.1,(parseFloat(cEl&&cEl.value)||50)/100));
  return {mass,cogY:def.h*r};
}
function refreshPeaks(){
  if(!proc)return;
  const tag=proc.bld?`（${proc.bld.floor}階床応答）`:"（地表）";
  document.getElementById("peaks").innerHTML=
    `<div class="peak pa"><span>PA最大 ${tag}</span><span class="v">${proc.pga.toFixed(1)} gal</span></div>`+
    `<div class="peak pv"><span>PV最大 ${tag}</span><span class="v">${proc.pgv.toFixed(1)} cm/s</span></div>`+
    `<div class="peak pd"><span>PD最大 ${tag}</span><span class="v">${proc.pgd.toFixed(1)} cm</span></div>`;
  document.getElementById("pkA").textContent=proc.pga.toFixed(1);
  document.getElementById("pkV").textContent=proc.pgv.toFixed(1);
  document.getElementById("pkD").textContent=proc.pgd.toFixed(1);
}
function bldCfg(){
  const N=Math.min(50,Math.max(3,parseInt(document.getElementById("bldN").value)||20));
  let fl=Math.min(N,Math.max(1,parseInt(document.getElementById("bldFloor").value)||N));
  document.getElementById("bldFloor").max=N;
  return {on:document.getElementById("bldOn").checked, N, floor:fl,
          type:document.getElementById("bldType").value};
}
function applyBuildingMode(){
  if(!procGround)return;
  const cfg=bldCfg();
  proc = cfg.on ? buildingResponse(procGround,cfg) : procGround;
  staticCache=null; orbitCache=null;
  refreshPeaks();
  const info=document.getElementById("bldInfo");
  if(cfg.on&&proc.bld){
    const B=proc.bld;
    info.innerHTML=`${B.N}階建 ${B.type}造 / T₁=${B.T1.toFixed(2)}s h=${(B.h*100).toFixed(0)}%<br>`+
      `対象: ${B.floor}階床 / PA増幅 ×${(proc.pga/procGround.pga).toFixed(2)}<br>`+
      `※水平2成分を応答解析、UDは地表波`;
  }else info.innerHTML="";
  sizeCharts();
  placeFurniture();
}
document.getElementById("btnFile").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      let text;
      try{text=new TextDecoder("shift_jis").decode(rd.result);}
      catch(_){text=new TextDecoder().decode(rd.result);}
      const rec=parseAnyCsv(text);
      procGround=processRecord(rec);
      document.getElementById("fileName").textContent=file.name;
      let info=`<b>形式</b>${rec.header.type}<br><b>観測点</b>${rec.header.code||"?"}<br>`;
      if(rec.header.origin)info+=`<b>${rec.header.mag?"発震時刻":"開始時刻"}</b>${rec.header.origin}<br>`;
      if(rec.header.mag)info+=`<b>M / 深さ</b>M${rec.header.mag} / ${rec.header.depth}km<br>`;
      info+=`<b>継続時間</b>${procGround.dur.toFixed(0)}s @ ${rec.header.fs||100}Hz`;
      document.getElementById("recInfo").innerHTML=info;
      btnRun.disabled=false;
      document.getElementById("btnStop").disabled=false;
      applyBuildingMode();
      msg(rec.fmt==="jma"?"読込・処理完了（気象庁 積分漸化式）":"読込・処理完了（HPF 0.1Hz, 5次 Butterworth）");
    }catch(err){ msg("読込失敗: "+err.message); }
  };
  rd.readAsArrayBuffer(file);
  e.target.value="";
};
btnRun.onclick=()=>{
  if(!proc)return;
  if(running){running=false;btnRun.textContent="加振開始";return;}
  if(simT>=proc.dur||!furniture.length)placeFurniture();
  running=true;btnRun.textContent="一時停止";
};
document.getElementById("btnStop").onclick=()=>placeFurniture();
function stopSimCore(){
  running=false;
  simT=physT=startT();
  btnRun.textContent="加振開始";
  document.getElementById("timeRead").textContent=simT.toFixed(1)+" s";
  if(proc)drawChartsBase();
  updateAccHud();
  drawOrbit();
}
document.getElementById("startSkip").onchange=()=>placeFurniture();
document.getElementById("btnPlace").onclick=placeFurniture;
document.getElementById("sceneSel").onchange=e=>{
  SCENE=e.target.value;
  running=false;
  clearFurniture();
  buildRoom();                       // 部屋寸法・床・天井高を再構築
  camDist=SCENES[SCENE].cam; updateCam();
  buildFurnList();
  placeFurniture();
  msg(SCENES[SCENE].label+" に切替");
};
document.getElementById("waveToggle").onclick=()=>{
  const d=document.getElementById("waveDrawer");
  d.classList.toggle("hidden");
  const shown=!d.classList.contains("hidden");
  document.getElementById("waveToggle").classList.toggle("shift",shown);
  document.getElementById("orbitToggle").classList.toggle("shift",shown);
  if(shown&&proc){sizeCharts();staticCache=null;drawChartsBase();}
};
document.getElementById("panelToggle").onclick=()=>{
  const p=document.getElementById("panel");
  p.classList.toggle("hidden");
  const hidden=p.classList.contains("hidden");
  document.body.classList.toggle("panel-hidden",hidden);
  document.getElementById("panelToggle").textContent=hidden?"≫ パネル":"≪ パネル";
};
document.getElementById("orbitToggle").onclick=()=>{
  const p=document.getElementById("orbitPanel");
  p.classList.toggle("show");
  if(p.classList.contains("show")){orbitCache=null;drawOrbit();}
};
document.getElementById("swapNSEW").onchange=()=>{
  orbitCache=null;
  placeFurniture();
  msg(document.getElementById("swapNSEW").checked
      ?"入替: NS記録→EW軸 / EW記録→NS軸":"通常: NS記録→NS軸 / EW記録→EW軸");
};
document.getElementById("ampScale").onchange=()=>{orbitCache=null;drawOrbit();updateAccHud();};
for(const id of["bldOn","bldType","bldN","bldFloor"])
  document.getElementById(id).onchange=()=>{
    applyBuildingMode();
    if(procGround&&document.getElementById("bldOn").checked&&proc.bld)
      msg(`${proc.bld.N}階建${proc.bld.type}造 ${proc.bld.floor}階の床応答で加振（T₁=${proc.bld.T1.toFixed(2)}s）`);
  };

buildFurnList();
initGL();
initPhysics();
placeFurniture();
requestAnimationFrame(ts=>{lastFrame=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
